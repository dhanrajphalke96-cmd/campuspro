{% extends 'core/base.html' %}
{% block title %}Password Reset Complete — CampusPro{% endblock %}
{% block page_title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="fade-in d-flex justify-content-center">
    <div class="erp-card mt-5 text-center" style="width: 100%; max-width: 450px; padding: 40px;">
        <i class="fas fa-check-circle text-accent-green" style="font-size: 56px; margin-bottom: 24px;"></i>
        <h4 style="color: var(--text-primary); font-weight: 700; margin-bottom: 16px;">Password Reset!</h4>
        <p style="color: var(--text-muted); font-size: 15px; margin-bottom: 30px;">
            Your password has been set. You may go ahead and log in now.
        </p>
        <a href="{% url 'login' %}" class="btn-primary-erp justify-content-center w-100 mt-2" style="padding: 12px;"><i class="fas fa-sign-in-alt me-2"></i>Log In</a>
    </div>
</div>
{% endblock %}
