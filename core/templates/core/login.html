{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CampusPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}?v=2" rel="stylesheet">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-side">
            <div class="login-side-content">
                <i class="fas fa-university logo-icon"></i>
                <h1>CampusPro</h1>
                <p>Campus Management System</p>
            </div>
        </div>
        <div class="login-form-container">
            <div class="login-card scale-in">
                <div class="login-logo">
                    <div class="logo-icon"><i class="fas fa-university"></i></div>
                    <h1>CampusPro</h1>
                    <p>Campus Management System</p>
                </div>

                {% if messages %}
                {% for message in messages %}
                <div class="alert-erp {{ message.tags }} mb-3 alert-auto-dismiss">
                    <i class="fas {% if message.tags == 'error' %}fa-times-circle text-accent-red{% else %}fa-info-circle text-accent-blue{% endif %}"></i>
                    <span>{{ message }}</span>
                </div>
                {% endfor %}
                {% endif %}

                <form method="post" id="login-form">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="login-username">Username</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="login-password">Password</label>
                        {{ form.password }}
                    </div>
                    <button type="submit" class="btn-login mt-2" id="login-submit">
                        <i class="fas fa-sign-in-alt me-2"></i> Sign In
                    </button>
                </form>

                <div class="text-center mt-4">
                    <small style="color: var(--text-muted);">
                        <a href="{% url 'password_reset' %}" class="text-decoration-none">Forgot Password?</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
