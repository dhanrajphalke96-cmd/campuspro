{% extends 'core/base.html' %}
{% block title %}AI Assistant — College ERP{% endblock %}
{% block page_title %}AI Assistant{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="row g-3">
        <!-- Chat Container -->
        <div class="col-12">
            <div class="erp-card" style="display: flex; flex-direction: column; height: 600px;">
                <h5 class="mb-3"><i class="fas fa-robot me-2 text-accent-blue"></i>AI Assistant</h5>
                
                <!-- Messages Area -->
                <div id="chat-messages" style="flex: 1; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; margin-bottom: 15px; background: var(--bg-hover);">
                    {% if not sessions %}
                    <div class="empty-state py-5 text-center">
                        <i class="fas fa-comments" style="font-size: 48px; color: var(--text-muted); margin-bottom: 15px; display: block;"></i>
                        <p>Start a conversation with our AI Assistant</p>
                    </div>
                    {% endif %}
                </div>

                <!-- Input Area -->
                <div class="input-group">
                    <input type="text" id="message-input" class="form-control" placeholder="Type your message..." style="border-radius: 4px 0 0 4px;">
                    <button id="send-btn" class="btn btn-primary" style="border-radius: 0 4px 4px 0;">
                        <i class="fas fa-paper-plane"></i> Send
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .message {
        margin-bottom: 12px;
        padding: 10px 15px;
        border-radius: 8px;
        max-width: 80%;
        word-wrap: break-word;
    }

    .message.user {
        align-self: flex-end;
        background: var(--accent-blue);
        color: white;
        margin-left: auto;
    }

    .message.assistant {
        align-self: flex-start;
        background: var(--bg-secondary);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
    }

    #chat-messages {
        display: flex;
        flex-direction: column;
    }
</style>

<script>
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const chatMessages = document.getElementById('chat-messages');
    let sessionId = null;

    function addMessage(role, content) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        messageDiv.textContent = content;
        messageDiv.style.alignSelf = role === 'user' ? 'flex-end' : 'flex-start';
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) return;

        addMessage('user', message);
        messageInput.value = '';
        sendBtn.disabled = true;

        try {
            const response = await fetch('{% url "chatbot-message" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                },
                body: JSON.stringify({
                    message: message,
                    session_id: sessionId,
                }),
            });

            if (response.ok) {
                const data = await response.json();
                addMessage('assistant', data.reply);
                sessionId = data.session_id;
            } else {
                const error = await response.json();
                addMessage('assistant', `Error: ${error.detail || 'Unable to get response'}`);
            }
        } catch (error) {
            addMessage('assistant', `Error: ${error.message}`);
        } finally {
            sendBtn.disabled = false;
            messageInput.focus();
        }
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
{% endblock %}
